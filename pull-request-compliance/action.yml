name: "Scalingo Pull Request Compliance GitHub Action"
description: "Validate pull request metadata and description compliance against template and policy"

inputs:
  pr-title:
    description: "Pull request title"
    required: true
  pr-body:
    description: "Pull request body markdown"
    required: true
  template-path:
    description: "Path to pull request template markdown"
    required: false
    default: ".github/pull_request_template.md"
  policy-path:
    description: "Path to pull request compliance policy markdown"
    required: false
    default: ".github/pr_compliance_policy.md"
  openai-api-key:
    description: "OpenAI API key used for policy/template validation"
    required: false
    default: ""
  openai-model:
    description: "OpenAI model to use for compliance inference"
    required: false
    default: "gpt-4o-mini"

runs:
  using: "composite"
  steps:
    - name: Validate PR compliance
      shell: bash
      env:
        PR_TITLE: ${{ inputs.pr-title }}
        PR_BODY: ${{ inputs.pr-body }}
        TEMPLATE_PATH: ${{ inputs.template-path }}
        POLICY_PATH: ${{ inputs.policy-path }}
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        OPENAI_MODEL: ${{ inputs.openai-model }}
      run: python3 "${GITHUB_ACTION_PATH}/scripts/check_pr_compliance.py"
