---
name: ShellCheck GitHub Action
description: |
  Execute ShellCheck in a GitHub Action.
  Scans all .sh file in the repo, and reports errors whose severity is info or
  above.

inputs:
  shellcheck-version:
    description: ShellCheck version
    required: false
    default: "0.11.0"

runs:
  using: "composite"
  steps:
    - name: Install shellcheck
      shell: bash
      run: |
        curl --silent --location --remote-name https://github.com/koalaman/shellcheck/releases/download/v${{ inputs.shellcheck-version }}/shellcheck-v${{ inputs.shellcheck-version }}.linux.x86_64.tar.xz
        tar --extract --xz --file shellcheck-v${{ inputs.shellcheck-version }}.linux.x86_64.tar.xz --directory /tmp
        sudo mv /tmp/shellcheck-v${{ inputs.shellcheck-version }}/shellcheck /usr/local/bin/
    - name: Run shellcheck
      shell: bash
      run: |
        find . -name "*.sh" -exec shellcheck -S info -s bash {} +
...
