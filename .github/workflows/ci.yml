name: Tests for Scalingo Actions

on:
  pull_request:
  push:
    branches: [main, master, prod]

jobs:
  go-tests-without-databases:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup the tests
        run: ./test/go-tests/setup.sh

      - name: Run Go tests action
        id: gotests
        uses: ./go-tests
        with:
          etcd: false
          mongodb: false
          redis: false

      - name: Test the Go tests action
        run: ./test/go-tests/execution.sh without-databases

  go-tests-with-databases:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup the tests
        run: ./test/go-tests/setup.sh

      - name: Run Go tests action
        id: gotests
        uses: ./go-tests
        with:
          etcd: true
          mongodb: true
          redis: true

      - name: Test the Go tests action
        run: ./test/go-tests/execution.sh with-databases

  go-tests-mongodb-auto:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup the tests
        run: ./test/go-tests/setup.sh

      - name: Run Go tests action
        id: gotests
        uses: ./go-tests

      - name: Test the Go tests action
        run: ./test/go-tests/execution.sh mongodb-auto

  js-linter-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup the tests
        run: ./test/js-linter/setup.sh

      - name: Run JS linter action
        uses: ./js-linter

      - name: Test the JS linter action
        run: ./test/js-linter/execution.sh

  go-linter:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Run Go lint action
        uses: ./go-linter
        with:
          working-directory: test/go-linter

  shellcheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Test the ShellCheck action
        run: ./test/shellcheck/execution.sh
